<section class="admin-requests">

  <div class="container">

    <h2>All Waste Requests</h2>

    <div class="status-messages">
      <p *ngIf="loading()" class="status-message">Loading requests…</p>
      <p *ngIf="!loading() && error()" class="status-message error">{{ error() }}</p>
      <p *ngIf="!loading() && !error() && requests().length === 0" class="status-message">
        No requests found.
      </p>
    </div>

    <table class="requests-table" *ngIf="!loading() && !error() && requests().length">

      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Item</th>
          <th>Category</th>
          <th>Status</th>
          <th>Preferred Date</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of requests()">
          <td>{{ r.id }}</td>
          <td>{{ r.userName }}</td>
          <td>{{ r.itemName }}</td>
          <td>{{ r.category }}</td>

          <td>
            <span class="status" [ngClass]="r.status?.toLowerCase()">
              {{ r.status }}
            </span>
          </td>

          <td>{{ r.preferredDate }}</td>

          <td>
            <button
              *ngIf="r.status === 'PENDING'"
              class="approve-btn"
              (click)="approveRequest(r.id)">
              Approve
            </button>

            <button
              *ngIf="r.status === 'PENDING'"
              class="reject-btn"
              (click)="rejectRequest(r.id)">
              Reject
            </button>
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</section>
