<section class="admin-dashboard">

    <div class="container">

        <h2>Admin Dashboard</h2>

        <div class="stats">

            <div class="stat-card">
                <h3>Total Requests</h3>
                <p>{{totalRequests()}}</p>
            </div>

            <div class="stat-card">
                <h3>Pending</h3>
                <p>{{pendingCount()}}</p>
            </div>

            <div class="stat-card">
                <h3>Approved</h3>
                <p>{{approvedCount()}}</p>
            </div>

        </div>


        <h2>Recent Requests</h2>

        <div class="status-messages">
          <p *ngIf="loading()" class="status-message">Loading dashboard…</p>
          <p *ngIf="!loading() && error()" class="status-message error">{{ error() }}</p>
        </div>

        <table class="requests-table" *ngIf="!loading() && !error() && requests().length">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Preferred Date</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let r of requests()">

                    <td>{{r.id}}</td>
                    <td>{{r.userName}}</td>
                    <td>{{r.itemName}}</td>
                    <td>{{r.category}}</td>

                    <td>
                        <span class="status" [ngClass]="r.status.toLowerCase()">
                            {{r.status}}
                        </span>
                    </td>

                    <td>{{r.preferredDate}}</td>

                </tr>

            </tbody>

        </table>

    </div>

</section>
