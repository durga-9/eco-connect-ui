<section class="request-page">

<div class="container">

<h2>Create E-Waste Pickup Request</h2>

<form (ngSubmit)="submitRequest()" #requestForm="ngForm">

<div class="form-group">
<label>Category</label>

<select [(ngModel)]="category" name="category" required>

<option value="">Select Category</option>
<option value="COMPUTER">Computer</option>
<option value="BATTERY">Battery</option>
<option value="MOBILE">Mobile</option>
<option value="CABLE">Cable</option>
<option value="APPLIANCE">Appliance</option>

</select>
</div>


<div class="form-group">
<label>Item Name</label>
<input type="text" [(ngModel)]="itemName" name="itemName" required>
</div>


<div class="form-group">
<label>Description</label>
<textarea [(ngModel)]="description" name="description" required></textarea>
</div>


<div class="form-group">
<label>Quantity</label>
<input type="number" [(ngModel)]="quantity" name="quantity" required>
</div>


<div class="form-group">
<label>Estimated Weight (kg)</label>
<input type="number" [(ngModel)]="estimatedWeight" name="estimatedWeight" required>
</div>


<div class="form-group">
<label>Pickup Address</label>
<input type="text" [(ngModel)]="pickupAddress" name="pickupAddress" required>
</div>


<div class="form-group">
<label>City</label>
<input type="text" [(ngModel)]="city" name="city" required>
</div>


<div class="form-group">
<label>Pincode</label>
<input type="text" [(ngModel)]="pincode" name="pincode" required>
</div>


<div class="form-group">
<label>Preferred Date</label>
<input type="date" [(ngModel)]="preferredDate" name="preferredDate" required>
</div>


<div class="form-group">
<label>Preferred Time Slot</label>
<select [(ngModel)]="preferredTimeSlot" name="preferredTimeSlot" required>

<option value="">Select Time Slot</option>
<option value="9 AM - 12 PM">9 AM - 12 PM</option>
<option value="12 PM - 3 PM">12 PM - 3 PM</option>
<option value="3 PM - 6 PM">3 PM - 6 PM</option>

</select>
</div>


<div class="form-group">
<label>Upload Image</label>
<input type="file" (change)="onFileSelected($event)">
</div>


<button type="submit" class="submit-btn">
Submit Request
</button>

</form>

</div>

</section>
