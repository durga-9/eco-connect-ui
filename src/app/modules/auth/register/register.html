<section class="register-page">

<div class="register-container">

<h2>Create EcoConnect Account</h2>

<form (ngSubmit)="register()">

<div class="form-group">
<label>Full Name</label>
<input type="text" [(ngModel)]="fullName" name="fullName" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" [(ngModel)]="email" name="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" [(ngModel)]="password" name="password" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" [(ngModel)]="phone" name="phone">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" [(ngModel)]="address" name="address">
</div>

<div class="form-group">
<label>City</label>
<input type="text" [(ngModel)]="city" name="city">
</div>

<div class="form-group">
<label>Pincode</label>
<input type="text" [(ngModel)]="pincode" name="pincode">
</div>

<button type="submit" class="register-btn">
Register
</button>

<p class="login-link">
Already have an account?
<a routerLink="/login">Login</a>
</p>

</form>

</div>

</section>
